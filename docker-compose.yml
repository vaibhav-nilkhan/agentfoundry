version: '3.8'

services:
  # Redis Cache (For future team features like real-time stats)
  redis:
    image: redis:7-alpine
    container_name: agentfoundry-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentfoundry-network

volumes:
  redis_data:
    driver: local

networks:
  agentfoundry-network:
    driver: bridge
