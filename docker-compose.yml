version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: agentfoundry-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentfoundry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentfoundry_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-agentfoundry}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentfoundry}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentfoundry-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agentfoundry-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentfoundry-network

  # Database Migration Runner
  db-migrate:
    build:
      context: .
      dockerfile: ./packages/db/Dockerfile.migrate
    container_name: agentfoundry-db-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentfoundry}:${POSTGRES_PASSWORD:-agentfoundry_dev_password}@db:5432/${POSTGRES_DB:-agentfoundry}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agentfoundry-network

  # Python Validator Service
  validator:
    build:
      context: ./packages/validator
      dockerfile: Dockerfile
    container_name: agentfoundry-validator
    restart: unless-stopped
    environment:
      PORT: ${VALIDATOR_PORT:-5100}
      PYTHONUNBUFFERED: 1
    ports:
      - "${VALIDATOR_PORT:-5100}:5100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5100/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agentfoundry-network

  # NestJS API Backend
  api:
    build:
      context: .
      dockerfile: ./packages/api/Dockerfile
    container_name: agentfoundry-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-4100}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentfoundry}:${POSTGRES_PASSWORD:-agentfoundry_dev_password}@db:5432/${POSTGRES_DB:-agentfoundry}?schema=public
      REDIS_URL: redis://redis:6379
      VALIDATOR_URL: http://validator:5100
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      API_KEY: ${API_KEY:-your-api-key-change-in-production}
    ports:
      - "${API_PORT:-4100}:4100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      validator:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4100/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agentfoundry-network

  # Next.js Web Frontend
  web:
    build:
      context: .
      dockerfile: ./packages/web/Dockerfile
    container_name: agentfoundry-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3100}
      NEXT_PUBLIC_APP_NAME: AgentFoundry
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3100}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4100}
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "${WEB_PORT:-3100}:3100"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agentfoundry-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  agentfoundry-network:
    driver: bridge
