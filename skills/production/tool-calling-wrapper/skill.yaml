schema_version: "1.0"
name: tool-calling-wrapper
version: 1.0.0
description: Universal tool execution wrapper with schema validation, automatic retry, and cross-framework compatibility

author:
  name: AgentFoundry Team
  email: team@agentfoundry.ai
  url: https://agentfoundry.ai

categories:
  - infrastructure
  - reliability
  - tool-execution
tags:
  - tool-calling
  - validation
  - retry
  - cross-platform
  - reliability

pricing:
  model: usage
  tiers:
    free:
      limit: 50
      period: month
      price: 0
    pro:
      limit: unlimited
      period: month
      price: 29
    enterprise:
      limit: unlimited
      period: month
      price: 199

platforms:
  - mcp
  - claude_skills
  - openai_actions
  - langchain
  - llamaindex

tools:
  - name: validate_tool_schema
    description: Validate tool input/output schemas before execution to catch errors early
    entry: src/tools/validate-tool-schema.ts
    input_schema:
      type: object
      required:
        - tool_name
        - tool_input
        - schema
      properties:
        tool_name:
          type: string
          description: Name of the tool to validate
        tool_input:
          type: object
          description: Input parameters to validate
        schema:
          type: object
          description: JSON Schema or Zod schema definition
          properties:
            type:
              type: string
              enum: [json_schema, zod]
              default: json_schema
            definition:
              type: object
        strict_mode:
          type: boolean
          description: Fail on warnings or only errors
          default: false
    output_schema:
      type: object
      properties:
        is_valid:
          type: boolean
        validation_errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
              severity:
                type: string
                enum: [error, warning]
        validation_warnings:
          type: array
          items:
            type: object
        suggested_fixes:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              current_value:
                description: Current value
              suggested_value:
                description: Suggested value
              reason:
                type: string
        metadata:
          type: object
          properties:
            validation_time_ms:
              type: number
            schema_type:
              type: string

  - name: execute_with_retry
    description: Execute tool with intelligent retry on failures, exponential backoff, and error classification
    entry: src/tools/execute-with-retry.ts
    input_schema:
      type: object
      required:
        - tool_name
        - tool_input
        - executor
      properties:
        tool_name:
          type: string
          description: Name of the tool to execute
        tool_input:
          type: object
          description: Input parameters for the tool
        executor:
          type: object
          description: Tool executor configuration
          properties:
            framework:
              type: string
              enum: [langchain, llamaindex, mcp, claude, openai, custom]
            tool_function:
              type: string
              description: Function reference or path
        retry_config:
          type: object
          properties:
            max_attempts:
              type: integer
              default: 3
              minimum: 1
              maximum: 10
            backoff_strategy:
              type: string
              enum: [exponential, linear, fixed]
              default: exponential
            initial_delay_ms:
              type: integer
              default: 1000
            max_delay_ms:
              type: integer
              default: 30000
            retry_on_errors:
              type: array
              description: Error types to retry on
              items:
                type: string
              default: [network, timeout, rate_limit, transient]
        validation:
          type: object
          properties:
            validate_input:
              type: boolean
              default: true
            validate_output:
              type: boolean
              default: true
            input_schema:
              type: object
            output_schema:
              type: object
        timeout_ms:
          type: integer
          description: Maximum execution time
          default: 60000
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        result:
          description: Tool execution result
        attempts_made:
          type: integer
        execution_log:
          type: array
          items:
            type: object
            properties:
              attempt:
                type: integer
              status:
                type: string
                enum: [success, failure, timeout]
              error:
                type: string
              duration_ms:
                type: number
              retry_delay_ms:
                type: number
        total_duration_ms:
          type: number
        error_details:
          type: object
          properties:
            error_type:
              type: string
            error_message:
              type: string
            is_retryable:
              type: boolean
            recovery_suggestion:
              type: string

  - name: verify_output
    description: Verify tool output matches expected schema and constraints, with auto-fix capabilities
    entry: src/tools/verify-output.ts
    input_schema:
      type: object
      required:
        - tool_name
        - tool_output
        - expected_schema
      properties:
        tool_name:
          type: string
        tool_output:
          description: Output from tool execution
        expected_schema:
          type: object
          description: Expected output schema
        verification_rules:
          type: array
          description: Custom verification rules
          items:
            type: object
            properties:
              rule_type:
                type: string
                enum: [type_check, range_check, format_check, custom]
              field:
                type: string
              constraint:
                description: Rule constraint definition
        auto_fix:
          type: boolean
          description: Attempt to fix minor issues
          default: false
        strict_mode:
          type: boolean
          default: false
    output_schema:
      type: object
      properties:
        is_valid:
          type: boolean
        verification_errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              expected:
                description: Expected value or type
              actual:
                description: Actual value or type
              severity:
                type: string
                enum: [error, warning, info]
        fixed_output:
          description: Auto-fixed output if auto_fix enabled
        fixes_applied:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              original_value:
                description: Original value
              fixed_value:
                description: Fixed value
              fix_type:
                type: string
        confidence_score:
          type: number
          description: Confidence in output validity (0-100)
        metadata:
          type: object

  - name: convert_tool_format
    description: Convert tool definitions between frameworks (LangChain, LlamaIndex, MCP, OpenAI, Claude)
    entry: src/tools/convert-tool-format.ts
    input_schema:
      type: object
      required:
        - tool_definition
        - source_framework
        - target_framework
      properties:
        tool_definition:
          type: object
          description: Tool definition in source format
        source_framework:
          type: string
          enum: [langchain, llamaindex, mcp, openai, claude, agentfoundry]
        target_framework:
          type: string
          enum: [langchain, llamaindex, mcp, openai, claude, agentfoundry]
        conversion_options:
          type: object
          properties:
            preserve_metadata:
              type: boolean
              default: true
            strict_compatibility:
              type: boolean
              description: Fail if features not supported in target
              default: false
            include_examples:
              type: boolean
              default: true
            generate_tests:
              type: boolean
              description: Generate test cases for converted tool
              default: false
    output_schema:
      type: object
      properties:
        converted_definition:
          type: object
          description: Tool definition in target format
        conversion_warnings:
          type: array
          items:
            type: object
            properties:
              feature:
                type: string
              message:
                type: string
              severity:
                type: string
        unsupported_features:
          type: array
          items:
            type: string
        compatibility_score:
          type: number
          description: Compatibility percentage (0-100)
        migration_notes:
          type: array
          items:
            type: string
        test_cases:
          type: array
          description: Generated test cases if requested
          items:
            type: object
        metadata:
          type: object

dependencies:
  runtime:
    - zod: ^3.22.0
    - ajv: ^8.12.0
    - axios: ^1.6.0

permissions:
  - network: Required for tool execution
  - process: Required for subprocess execution

documentation:
  readme: README.md
  examples:
    - examples/validate-langchain-tool.md
    - examples/retry-with-backoff.md
    - examples/cross-framework-conversion.md

# Marketplace Tier
tier: production
