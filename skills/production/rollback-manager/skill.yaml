schema_version: "1.0"
name: rollback-manager
version: 1.0.0
description: Transaction-like semantics for agent actions with automatic rollback on failure

author:
  name: AgentFoundry Team
  email: team@agentfoundry.ai
  url: https://agentfoundry.ai

categories:
  - error-recovery
  - transactions
  - reliability
tags:
  - rollback
  - transactions
  - undo
  - recovery

pricing:
  model: usage
  tiers:
    free:
      limit: 30
      period: month
      price: 0
    pro:
      limit: unlimited
      period: month
      price: 35
    enterprise:
      limit: unlimited
      period: month
      price: 179

platforms:
  - mcp
  - claude_skills
  - langchain

tools:
  - name: create_checkpoint
    description: Create a savepoint for rollback
    entry: src/tools/create-checkpoint.ts
    input_schema:
      type: object
      required:
        - state
      properties:
        state:
          type: object
        checkpoint_name:
          type: string
    output_schema:
      type: object
      properties:
        checkpoint_id:
          type: string

  - name: rollback
    description: Restore to previous checkpoint
    entry: src/tools/rollback.ts
    input_schema:
      type: object
      required:
        - checkpoint_id
      properties:
        checkpoint_id:
          type: string
    output_schema:
      type: object
      properties:
        restored_state:
          type: object

  - name: commit_transaction
    description: Finalize changes and discard checkpoints
    entry: src/tools/commit-transaction.ts
    input_schema:
      type: object
      required:
        - transaction_id
      properties:
        transaction_id:
          type: string
    output_schema:
      type: object
      properties:
        committed:
          type: boolean

dependencies:
  runtime:
    - zod: ^3.22.0

permissions:
  - storage: For checkpoint persistence

documentation:
  readme: README.md

metrics:
  tracked:
    - checkpoints_created
    - rollbacks_performed
    - transactions_committed
  reporting: true
  retention_days: 90
