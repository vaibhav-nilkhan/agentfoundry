schema_version: "1.0"
name: error-recovery-orchestrator
version: 1.0.0
description: Automatically detect, analyze, and recover from agent workflow failures with intelligent retry, rollback, and fallback strategies

author:
  name: AgentFoundry Team
  email: team@agentfoundry.ai
  url: https://agentfoundry.ai

categories:
  - infrastructure
  - reliability
tags:
  - reliability
  - error-recovery
  - resilience
  - monitoring
  - debugging

pricing:
  model: usage
  tiers:
    free:
      limit: 100
      period: month
      price: 0
    pro:
      limit: unlimited
      period: month
      price: 99
    enterprise:
      limit: unlimited
      period: month
      price: custom

platforms:
  - mcp
  - claude_skills
  - openai_actions

tools:
  - name: detect_failure
    description: Analyze errors and classify their severity, type, and recoverability with intelligent recommendations
    entry: src/tools/detect-failure.ts
    input_schema:
      type: object
      required:
        - error_message
        - step_number
        - workflow_context
      properties:
        error_message:
          type: string
          description: The error text or message
        error_code:
          type: string
          description: Optional error code
        step_number:
          type: integer
          description: Which step in the workflow failed
          minimum: 1
        workflow_context:
          type: object
          required:
            - total_steps
            - completed_steps
            - previous_step
            - next_step
          properties:
            total_steps:
              type: integer
              minimum: 1
            completed_steps:
              type: integer
              minimum: 0
            previous_step:
              type: string
            next_step:
              type: string
        execution_history:
          type: array
          description: Past execution attempts for learning
          items:
            type: object
            properties:
              step:
                type: string
              status:
                type: string
                enum: [success, failure]
              timestamp:
                type: string
                format: date-time
    output_schema:
      type: object
      properties:
        failure_classification:
          type: object
          properties:
            type:
              type: string
              enum: [transient, permanent, critical]
            severity:
              type: string
              enum: [low, medium, high, critical]
            is_recoverable:
              type: boolean
            confidence:
              type: integer
              minimum: 0
              maximum: 100
        root_cause:
          type: object
          properties:
            category:
              type: string
            description:
              type: string
            likely_causes:
              type: array
              items:
                type: string
        recovery_recommendation:
          type: object
          properties:
            strategy:
              type: string
              enum: [retry, rollback, fallback, skip, manual]
            estimated_success_rate:
              type: integer
            reasoning:
              type: string
        metadata:
          type: object

  - name: execute_recovery
    description: Execute recovery strategies including retry with exponential backoff, rollback to previous state, or fallback to alternative path
    entry: src/tools/execute-recovery.ts
    input_schema:
      type: object
      required:
        - strategy
        - workflow_state
      properties:
        strategy:
          type: string
          enum: [retry, rollback, fallback, skip]
          description: Recovery strategy to execute
        workflow_state:
          type: object
          required:
            - current_step
            - total_steps
            - state_snapshot
            - failed_step_id
          properties:
            current_step:
              type: integer
            total_steps:
              type: integer
            state_snapshot:
              type: object
              description: State before failure
            failed_step_id:
              type: string
        retry_config:
          type: object
          properties:
            max_attempts:
              type: integer
              default: 3
            backoff_strategy:
              type: string
              enum: [linear, exponential, fixed]
              default: exponential
            initial_delay_ms:
              type: integer
              default: 1000
            max_delay_ms:
              type: integer
              default: 30000
        fallback_config:
          type: object
          properties:
            alternative_step:
              type: string
            alternative_parameters:
              type: object
        rollback_config:
          type: object
          properties:
            target_step:
              type: integer
            cleanup_actions:
              type: array
              items:
                type: string
    output_schema:
      type: object
      properties:
        recovery_result:
          type: object
          properties:
            status:
              type: string
              enum: [success, partial_success, failure]
            strategy_used:
              type: string
            attempts_made:
              type: integer
            recovered_at_step:
              type: integer
        execution_log:
          type: array
          items:
            type: object
        new_workflow_state:
          type: object
        recommendations:
          type: object
        metadata:
          type: object

  - name: monitor_health
    description: Track agent workflow health metrics and predict failures before they occur using statistical anomaly detection
    entry: src/tools/monitor-health.ts
    input_schema:
      type: object
      required:
        - workflow_id
        - metrics
      properties:
        workflow_id:
          type: string
          description: Unique workflow identifier
        metrics:
          type: object
          required:
            - step_durations_ms
            - error_count
            - warning_count
          properties:
            step_durations_ms:
              type: array
              items:
                type: integer
            error_count:
              type: integer
              minimum: 0
            warning_count:
              type: integer
              minimum: 0
            memory_usage_mb:
              type: number
            cpu_usage_percent:
              type: number
            api_call_count:
              type: integer
        thresholds:
          type: object
          properties:
            max_step_duration_ms:
              type: integer
              default: 30000
            max_error_rate:
              type: number
              default: 0.2
            max_memory_mb:
              type: number
              default: 1024
        prediction_window_minutes:
          type: integer
          default: 5
          description: How far ahead to predict
    output_schema:
      type: object
      properties:
        health_status:
          type: object
          properties:
            overall:
              type: string
              enum: [healthy, degraded, critical]
            score:
              type: integer
              minimum: 0
              maximum: 100
            confidence:
              type: integer
        anomalies_detected:
          type: array
          items:
            type: object
        failure_prediction:
          type: object
          properties:
            likely_to_fail:
              type: boolean
            probability:
              type: integer
            predicted_failure_time_minutes:
              type: integer
            predicted_failure_type:
              type: string
        recommendations:
          type: object
        metadata:
          type: object

  - name: generate_postmortem
    description: Create detailed failure analysis reports with root cause analysis, timeline, and actionable recommendations
    entry: src/tools/generate-postmortem.ts
    input_schema:
      type: object
      required:
        - workflow_id
        - failure_data
        - recovery_attempts
      properties:
        workflow_id:
          type: string
        failure_data:
          type: object
          required:
            - failed_step
            - error_message
            - execution_history
          properties:
            failed_step:
              type: string
            error_message:
              type: string
            stack_trace:
              type: string
            execution_history:
              type: array
              items:
                type: object
        recovery_attempts:
          type: array
          items:
            type: object
            properties:
              strategy:
                type: string
              result:
                type: string
              details:
                type: object
        context:
          type: object
          properties:
            user_id:
              type: string
            environment:
              type: string
              enum: [dev, staging, production]
            agent_version:
              type: string
        include_recommendations:
          type: boolean
          default: true
    output_schema:
      type: object
      properties:
        postmortem:
          type: object
          properties:
            incident_id:
              type: string
            summary:
              type: string
            timeline:
              type: array
            root_cause_analysis:
              type: object
            impact_assessment:
              type: object
            recovery_summary:
              type: object
            lessons_learned:
              type: array
            action_items:
              type: array
        visualizations:
          type: object
        metadata:
          type: object

dependencies:
  runtime:
    - zod: ^3.22.0
    - axios: ^1.6.0

permissions:
  - network: Required for external API calls in recovery
  - file_system: Required for state persistence
  - process: Required for workflow management

documentation:
  readme: README.md
  examples:
    - examples/basic-retry.md
    - examples/rollback-scenario.md
    - examples/health-monitoring.md

metrics:
  tracked:
    - recovery_success_rate
    - mean_time_to_recovery
    - false_positive_rate
    - prediction_accuracy
  reporting: true
  retention_days: 90
