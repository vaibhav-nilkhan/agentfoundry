schema_version: "1.0"
name: api-contract-guardian
version: 1.0.0
description: Detect breaking API changes, generate tests, and analyze consumer impact before shipping

author:
  name: AgentFoundry
  email: skills@agentfoundry.dev
  url: https://agentfoundry.dev

platforms:
  - web
  - desktop
  - api

permissions:
  - file_read
  - network_access
  - git_read

categories:
  - developer-tools
  - api-testing
  - devops

tags:
  - api
  - openapi
  - swagger
  - breaking-changes
  - contract-testing
  - versioning
  - ci-cd
  - semver

tools:
  - name: detect_breaking_changes
    description: Compare two OpenAPI specs and detect breaking changes with version recommendations
    entry: src/tools/detect-breaking-changes.ts
    input_schema:
      type: object
      properties:
        old_spec_url:
          type: string
          description: URL or path to old OpenAPI spec (YAML or JSON)
        new_spec_url:
          type: string
          description: URL or path to new OpenAPI spec (YAML or JSON)
        current_version:
          type: string
          description: Current API version (semver format like 2.1.0)
        strict_mode:
          type: boolean
          description: Fail on minor changes too (default false)
          default: false
      required:
        - old_spec_url
        - new_spec_url
        - current_version

  - name: generate_api_tests
    description: Auto-generate comprehensive test suite from OpenAPI specification
    entry: src/tools/generate-api-tests.ts
    input_schema:
      type: object
      properties:
        spec_url:
          type: string
          description: URL or path to OpenAPI spec
        base_url:
          type: string
          description: API base URL for testing (e.g., https://api.example.com)
        test_framework:
          type: string
          enum: [jest, mocha, pytest, junit]
          default: jest
          description: Test framework to generate code for
        include_auth:
          type: boolean
          description: Generate authentication tests
          default: true
      required:
        - spec_url
        - base_url

  - name: analyze_consumer_impact
    description: Analyze which API consumers will be affected by breaking changes
    entry: src/tools/analyze-consumer-impact.ts
    input_schema:
      type: object
      properties:
        breaking_changes:
          type: array
          description: List of breaking changes from detect_breaking_changes
          items:
            type: object
        api_logs:
          type: string
          description: Path to API access logs or analytics data
        time_range:
          type: string
          description: Time range for log analysis (e.g., 30d, 7d, 90d)
          default: 30d
      required:
        - breaking_changes
        - api_logs

  - name: generate_migration_guide
    description: Create detailed migration guide for API version upgrade
    entry: src/tools/generate-migration-guide.ts
    input_schema:
      type: object
      properties:
        old_version:
          type: string
          description: Old API version (semver)
        new_version:
          type: string
          description: New API version (semver)
        breaking_changes:
          type: array
          description: List of breaking changes
          items:
            type: object
        format:
          type: string
          enum: [markdown, html, pdf]
          default: markdown
          description: Output format for migration guide
      required:
        - old_version
        - new_version
        - breaking_changes

dependencies:
  runtime:
    - "@apidevtools/swagger-parser@^10.1.0"
    - "openapi-diff@^0.27.0"
    - "json-schema-diff@^1.0.0"
    - "semver@^7.5.0"
    - "axios@^1.6.0"
    - "zod@^3.22.0"
    - "js-yaml@^4.1.0"
  development:
    - "openapi-types@^12.1.3"
    - "@types/js-yaml@^4.0.5"
    - "@types/semver@^7.5.0"

pricing:
  model: freemium
  tiers:
    - name: Free
      price: 0
      limits:
        requests_per_month: 100
        max_spec_size_kb: 500
      features:
        - Breaking change detection
        - Basic test generation
        - Version recommendations

    - name: Pro
      price: 29
      limits:
        requests_per_month: 1000
        max_spec_size_kb: 5000
      features:
        - Everything in Free
        - Consumer impact analysis
        - Migration guide generation
        - Priority support

    - name: Enterprise
      price: 199
      limits:
        requests_per_month: unlimited
        max_spec_size_kb: unlimited
      features:
        - Everything in Pro
        - Custom CI/CD integration
        - Private spec repositories
        - SLA guarantees
        - Dedicated support

environment_variables:
  optional:
    - name: GITHUB_TOKEN
      description: GitHub token for accessing private repositories
    - name: GITLAB_TOKEN
      description: GitLab token for accessing private repositories
    - name: API_GATEWAY_KEY
      description: API Gateway key for accessing analytics

metadata:
  repository: https://github.com/agentfoundry/skills/api-contract-guardian
  documentation: https://docs.agentfoundry.dev/skills/api-contract-guardian
  license: MIT
  keywords:
    - api-testing
    - openapi
    - swagger
    - breaking-changes
    - contract-testing
