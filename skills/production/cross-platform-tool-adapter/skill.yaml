name: cross-platform-tool-adapter
version: 1.0.0
author: AgentFoundry
description: Auto-translate tool definitions across OpenAI, Anthropic, Bedrock, Cohere, and Ollama. Write once, run anywhere.
category: infrastructure
tags:
  - tool-calling
  - cross-platform
  - compatibility
  - openai
  - anthropic
  - bedrock
  - cohere
  - ollama

# Pain points this skill solves
solves_issues:
  - langchain-33855  # tool_choice='any' incompatible with Bedrock
  - langchain-28848  # bind_tools not callable after with_structured_output
  - langchain-29410  # ChatOllama structured output not honoured
  - langchain-29282  # DeepSeek V3 no structured output support
  - langchain-33965  # ToolMessage content arrays not supported
  - langchain-32492  # GPT-5 verbosity + structured output conflict
  - llama-index-19212  # Anthropic tool calling parameters missing

# Platforms supported
platforms:
  - CLAUDE_SKILLS
  - MCP
  - LANGCHAIN
  - GPT_ACTIONS

# Pricing
pricing:
  type: FREE
  tier: community

# Capabilities
capabilities:
  - Platform detection (auto-detect target LLM provider)
  - Tool schema translation (OpenAI → Anthropic, Bedrock, Cohere, Ollama)
  - Parameter mapping (tool_choice, tools array, response_format)
  - Legacy migration (function_call → tool_calls)
  - Validation (pre-flight schema checks)
  - Fallback handling (graceful degradation for unsupported features)

# Permissions required
permissions:
  - read:tools
  - write:tools
  - read:llm-config

# Dependencies
dependencies:
  zod: ^3.22.4
  @anthropic-ai/sdk: ^0.27.0
  @aws-sdk/client-bedrock-runtime: ^3.645.0

# Performance
performance:
  latency: <10ms
  memory: <5MB

# Reliability
reliability:
  error_rate: <0.1%
  test_coverage: 95%

# Validation
validation:
  static_analysis: true
  security_scan: true
  behavior_test: true
  cross_platform_test: true

