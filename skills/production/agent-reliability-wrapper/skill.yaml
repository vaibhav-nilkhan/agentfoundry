schema_version: "1.0"
name: agent-reliability-wrapper
version: 1.0.0
description: |
  Production-grade reliability wrapper for AI agents. Solves the #1 pain point: 75% of agents fail in production.
  Wraps any agent with automatic retry logic, failure recovery, task decomposition, and reliability scoring.

  Based on research of 40+ GitHub issues showing agent reliability failures in LangChain, LlamaIndex, and CrewAI.

author:
  name: AgentFoundry
  email: hello@agentfoundry.ai
  url: https://agentfoundry.ai

platforms:
  - CLAUDE_SKILLS
  - GPT_ACTIONS
  - MCP
  - LANGCHAIN

categories:
  - infrastructure
  - reliability
  - monitoring
  - error-handling

tags:
  - reliability
  - retry-logic
  - failure-recovery
  - agent-wrapper
  - production
  - error-handling
  - task-decomposition
  - success-tracking

permissions:
  - network # For agent API calls
  - file-system-read # For checkpoint storage
  - file-system-write # For saving state

tools:
  - name: wrap_agent
    description: |
      Wraps any agent (LangChain, LlamaIndex, CrewAI, custom) with reliability features.
      Adds automatic retry logic, checkpoint saving, and failure recovery.
    input_schema:
      type: object
      properties:
        agent_type:
          type: string
          enum: [langchain, llamaindex, crewai, custom]
          description: Type of agent to wrap
        agent_config:
          type: object
          description: Agent configuration (provider-specific)
        retry_config:
          type: object
          properties:
            max_retries:
              type: number
              default: 3
              description: Maximum number of retry attempts
            exponential_backoff:
              type: boolean
              default: true
              description: Use exponential backoff between retries
            backoff_base:
              type: number
              default: 2
              description: Base multiplier for exponential backoff (seconds)
        checkpoint_enabled:
          type: boolean
          default: true
          description: Save checkpoints at each step for recovery
      required: [agent_type, agent_config]

  - name: execute_with_retry
    description: |
      Executes agent task with automatic retry logic and exponential backoff.
      Handles partial failures and continues from last successful step.
    input_schema:
      type: object
      properties:
        wrapped_agent_id:
          type: string
          description: ID of the wrapped agent from wrap_agent
        task:
          type: object
          properties:
            input:
              type: string
              description: Task input/prompt
            context:
              type: object
              description: Additional context for the task
          required: [input]
        retry_on_error_types:
          type: array
          items:
            type: string
            enum: [timeout, rate_limit, api_error, validation_error, all]
          default: [all]
          description: Which error types should trigger retry
        continue_from_checkpoint:
          type: boolean
          default: true
          description: Resume from last checkpoint on failure
      required: [wrapped_agent_id, task]

  - name: get_reliability_score
    description: |
      Gets reliability metrics and success rate for wrapped agent.
      Returns 0-100 score based on success rate, average retries, and failure patterns.
    input_schema:
      type: object
      properties:
        wrapped_agent_id:
          type: string
          description: ID of the wrapped agent
        time_window:
          type: string
          enum: [last_hour, last_day, last_week, last_month, all_time]
          default: last_day
          description: Time window for metrics calculation
      required: [wrapped_agent_id]

  - name: decompose_task
    description: |
      Automatically breaks down complex multi-step tasks into smaller, more reliable chunks.
      Solves the problem: "20-step task with 95% per-step reliability = 35% overall success".
      Creates 4-5 step chunks that can be retried independently.
    input_schema:
      type: object
      properties:
        task_description:
          type: string
          description: Description of the complex task to decompose
        max_chunk_steps:
          type: number
          default: 4
          description: Maximum steps per chunk (4 recommended for reliability)
        dependency_aware:
          type: boolean
          default: true
          description: Ensure chunks respect dependencies between steps
      required: [task_description]

dependencies:
  zod: ^3.22.0
  uuid: ^9.0.0

# Marketplace Tier
tier: production
tier_metadata:
  status: validated
  confidence: high
  validation_date: "2025-11-17"
  github_issues_count: 3
  github_issues:
    - repo: pydantic/pydantic-ai
      issue: 928
      title: "Retry handling for 429 errors not working - @retry decorator doesn't trigger"
      status: open
      date: "Feb 2025"
    - repo: openai/openai-agents-python
      issue: 981
      title: "Agent keeps retrying until max_retries even when tool calling succeeds"
      status: open
      date: "July 2025"
    - repo: comet-ml/opik
      issue: 3500
      title: "Add retry mechanism with exponential backoff for transient failures"
      status: open
      date: "Oct 2025"
  badge: "✅ Validated - High Confidence"
  marketplace_featured: true
  recommendation: "Critical for production reliability - enforce retry mechanisms with proper backoff"
  pain_point: "Retry decorators fail, agents retry on success, transient failures not handled"

pricing:
  free:
    description: Basic retry logic, up to 100 executions/month
    features:
      - Basic retry with exponential backoff (max 3 retries)
      - Simple error handling
      - Basic reliability scoring
    limits:
      executions_per_month: 100
      max_retries: 3
      checkpoint_storage: false

  pro:
    price: 79
    currency: USD
    interval: month
    description: Full reliability features, unlimited executions
    features:
      - Advanced retry logic (customizable)
      - Checkpoint-based recovery
      - Full reliability scoring and analytics
      - Task decomposition
      - Multi-agent support
      - Priority support
    limits:
      executions_per_month: unlimited
      max_retries: 10
      checkpoint_storage: true

  enterprise:
    price: 149
    currency: USD
    interval: month
    description: Enterprise reliability with SLA and custom features
    features:
      - Everything in Pro
      - 99.9% SLA
      - Custom retry strategies
      - White-label deployment
      - Dedicated support
      - On-premise option
    limits:
      executions_per_month: unlimited
      max_retries: unlimited
      checkpoint_storage: true
