schema_version: "1.0"
name: performance-monitor
version: 1.0.0
description: Track agent performance metrics including latency, success rate, and resource usage

author:
  name: AgentFoundry Team
  email: team@agentfoundry.ai
  url: https://agentfoundry.ai

categories:
  - observability
  - monitoring
  - performance
tags:
  - monitoring
  - metrics
  - performance
  - observability

pricing:
  model: usage
  tiers:
    free:
      limit: 30
      period: month
      price: 0
    pro:
      limit: unlimited
      period: month
      price: 25
    enterprise:
      limit: unlimited
      period: month
      price: 129

platforms:
  - mcp
  - claude_skills
  - openai_actions

tools:
  - name: track_metrics
    description: Record performance metrics
    entry: src/tools/track-metrics.ts
    input_schema:
      type: object
      required:
        - metric_type
        - value
      properties:
        metric_type:
          type: string
          enum: [latency, success_rate, cost, tokens]
        value:
          type: number
        agent_id:
          type: string
    output_schema:
      type: object
      properties:
        recorded:
          type: boolean

  - name: get_dashboard
    description: View performance dashboard
    entry: src/tools/get-dashboard.ts
    input_schema:
      type: object
      properties:
        time_range:
          type: string
          enum: [hour, day, week, month]
          default: day
    output_schema:
      type: object
      properties:
        metrics:
          type: object
        trends:
          type: object

  - name: set_alert
    description: Configure performance alerts
    entry: src/tools/set-alert.ts
    input_schema:
      type: object
      required:
        - metric
        - threshold
      properties:
        metric:
          type: string
        threshold:
          type: number
        condition:
          type: string
          enum: [above, below]
    output_schema:
      type: object
      properties:
        alert_id:
          type: string

dependencies:
  runtime:
    - zod: ^3.22.0

permissions:
  - storage: For metrics persistence

documentation:
  readme: README.md

metrics:
  tracked:
    - metrics_recorded
    - alerts_triggered
  reporting: true
  retention_days: 90
