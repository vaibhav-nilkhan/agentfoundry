schema_version: "1.0"

name: viral-content-predictor
version: 1.0.0
description: Predict content virality BEFORE publishing with AI-powered scoring, platform-specific optimization, and A/B testing

author:
  name: AgentFoundry Team
  email: team@agentfoundry.dev
  github: agentfoundry

license: MIT

repository:
  type: git
  url: https://github.com/agentfoundry/skills/viral-content-predictor

homepage: https://agentfoundry.dev/skills/viral-content-predictor

platforms:
  - mcp
  - claude-skills
  - openai-agents

permissions:
  - network

categories:
  - content-creation
  - social-media
  - marketing

tags:
  - viral-content
  - engagement
  - social-media
  - content-optimization
  - prediction
  - analytics

tools:
  - name: predict_virality
    description: Score content virality potential before publishing with platform-specific analysis
    entry: src/tools/predict-virality.ts
    input_schema:
      type: object
      properties:
        content:
          type: string
          description: Full content text
        platform:
          type: string
          enum: [twitter, linkedin, youtube, tiktok, instagram]
          description: Target platform
        media:
          type: array
          items:
            type: string
            format: uri
          description: URLs to images/videos (optional)
        scheduled_time:
          type: string
          format: date-time
          description: When you plan to post (optional)
        user_id:
          type: string
          description: For personalized predictions based on history (optional)
      required:
        - content
        - platform
    output_schema:
      type: object
      properties:
        overall_score:
          type: integer
          description: 0-100 virality score
          minimum: 0
          maximum: 100
        rating:
          type: string
          enum: [poor, fair, good, excellent, viral]
        breakdown:
          type: object
          properties:
            hook_strength:
              type: integer
            structure:
              type: integer
            emotional_resonance:
              type: integer
            trend_alignment:
              type: integer
            visual_appeal:
              type: integer
            call_to_action:
              type: integer
        predicted_metrics:
          type: object
          properties:
            impressions:
              type: integer
            likes:
              type: integer
            shares:
              type: integer
            comments:
              type: integer
        improvements:
          type: array
          items:
            type: object
            properties:
              issue:
                type: string
              impact:
                type: string
                enum: [high, medium, low]
              recommendation:
                type: string
              expected_score_increase:
                type: integer

  - name: optimize_content
    description: Get specific recommendations to improve virality score with rewritten content
    entry: src/tools/optimize-content.ts
    input_schema:
      type: object
      properties:
        content:
          type: string
          description: Original content
        platform:
          type: string
          enum: [twitter, linkedin, youtube, tiktok, instagram]
        current_score:
          type: integer
          description: Score from predict_virality
          minimum: 0
          maximum: 100
        target_score:
          type: integer
          description: Desired score to reach
          minimum: 0
          maximum: 100
      required:
        - content
        - platform
        - current_score
    output_schema:
      type: object
      properties:
        optimized_content:
          type: string
          description: Rewritten version with improvements
        changes_made:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              original:
                type: string
              improved:
                type: string
              reason:
                type: string
        new_score:
          type: integer
        achieved_target:
          type: boolean

  - name: test_variations
    description: Compare multiple content or thumbnail variations to pick the best performer
    entry: src/tools/test-variations.ts
    input_schema:
      type: object
      properties:
        variations:
          type: array
          items:
            type: object
            properties:
              content:
                type: string
              media:
                type: array
                items:
                  type: string
          minItems: 2
          maxItems: 5
        platform:
          type: string
          enum: [twitter, linkedin, youtube, tiktok, instagram]
      required:
        - variations
        - platform
    output_schema:
      type: object
      properties:
        winner:
          type: integer
          description: Index of best-performing variation (0-based)
        comparison:
          type: array
          items:
            type: object
            properties:
              variation_index:
                type: integer
              score:
                type: integer
              predicted_impressions:
                type: integer
              strengths:
                type: array
              weaknesses:
                type: array

  - name: discover_viral_patterns
    description: Analyze user's historical content to discover their personal viral formula
    entry: src/tools/discover-viral-patterns.ts
    input_schema:
      type: object
      properties:
        user_id:
          type: string
          description: User identifier
        platform:
          type: string
          enum: [twitter, linkedin, youtube, tiktok, instagram]
        time_range:
          type: string
          enum: ["30d", "90d", "1y", "all"]
          default: "90d"
      required:
        - user_id
        - platform
    output_schema:
      type: object
      properties:
        viral_patterns:
          type: array
          description: What makes YOUR content go viral
        anti_patterns:
          type: array
          description: What to avoid
        best_posting_times:
          type: array
        content_templates:
          type: array
          description: Proven formulas for your audience
        next_post_suggestion:
          type: string

dependencies:
  npm:
    - "axios@^1.6.0"
    - "zod@^3.22.4"
    - "compromise@^14.10.0"
    - "sentiment@^5.0.2"
  env:
    - name: ANTHROPIC_API_KEY
      required: true
      description: Claude API key for AI-powered analysis
    - name: TWITTER_API_KEY
      required: false
      description: Twitter API for user analytics (optional)
    - name: YOUTUBE_API_KEY
      required: false
      description: YouTube Data API (optional)

config:
  timeout_ms: 30000
  supported_platforms:
    - twitter
    - linkedin
    - youtube
    - tiktok
    - instagram

pricing:
  type: freemium
  distribution_model: hybrid  # FREE: client-side, PREMIUM: server-side only
  tiers:
    - name: free
      price: 0
      distribution: client-side  # Code distributed as npm package
      limits:
        predictions_per_month: 100
        platforms: 1
        tools: [predict_virality]  # Basic prediction only
    - name: creator
      price: 39
      distribution: server-side  # Code runs on AgentFoundry servers ONLY
      limits:
        predictions_per_month: unlimited
        platforms: all
        tools: [predict_virality, optimize_content, test_variations, discover_viral_patterns]
    - name: pro
      price: 99
      distribution: server-side  # Code runs on AgentFoundry servers ONLY
      limits:
        predictions_per_month: unlimited
        platforms: all
        tools: [predict_virality, optimize_content, test_variations, discover_viral_patterns]
        features: [api_access, white_label, priority_support]

validation:
  static_checks:
    - manifest_schema
    - required_files
    - typescript_compile
    - linting
  sandbox_tests:
    - basic_execution
    - error_handling
    - platform_support

# Marketplace Tier
tier: experimental
tier_metadata:
  status: weak
  confidence: low
  validation_date: "2025-11-17"
  badge: "⚠️ Experimental - Use at Own Risk"
  marketplace_featured: false
  experimental_reason: "Research suggests limited efficacy - questionable value proposition"
  research: "Nature Scientific Reports (2024): Most viral events do NOT significantly increase engagement"
  existing_tools:
    - Reelmind.ai
    - Viral content calculators
  recommendation: "Research suggests focusing on virality may be inefficient"
  warning: "Efficacy is questionable per scientific research"
