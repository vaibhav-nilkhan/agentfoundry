schema_version: "1.0"
name: content-gap-analyzer
version: 1.0.0
description: Find content gaps vs competitors, generate briefs, and discover untapped opportunities

author:
  name: AgentFoundry
  email: skills@agentfoundry.dev
  url: https://agentfoundry.dev

platforms:
  - web
  - desktop
  - api

permissions:
  - network_access

categories:
  - content-creation
  - seo
  - marketing

tags:
  - content-strategy
  - seo
  - competitor-analysis
  - content-marketing
  - keyword-research

tools:
  - name: analyze_content_gaps
    description: Find content gaps compared to competitors with traffic estimates
    entry: src/tools/analyze-content-gaps.ts
    input_schema:
      type: object
      properties:
        your_domain:
          type: string
          description: Your website domain (e.g., example.com)
        competitor_domains:
          type: array
          items:
            type: string
          description: Up to 5 competitor domains
          maxItems: 5
        content_type:
          type: string
          enum: [all, blog, documentation, video]
          default: all
        language:
          type: string
          default: en
      required:
        - your_domain
        - competitor_domains

  - name: generate_content_brief
    description: Create detailed content brief from a content gap
    entry: src/tools/generate-content-brief.ts
    input_schema:
      type: object
      properties:
        topic:
          type: string
        target_keywords:
          type: array
          items:
            type: string
        competitor_urls:
          type: array
          description: Competing articles to analyze
          items:
            type: string
        content_format:
          type: string
          enum: [article, guide, tutorial, comparison, listicle]
          default: article
      required:
        - topic
        - target_keywords

  - name: monitor_competitor_content
    description: Track new content published by competitors
    entry: src/tools/monitor-competitor-content.ts
    input_schema:
      type: object
      properties:
        competitor_domains:
          type: array
          items:
            type: string
        check_frequency:
          type: string
          enum: [daily, weekly, monthly]
          default: weekly
        alert_threshold:
          type: string
          enum: [all, high_priority_only]
          default: high_priority_only
      required:
        - competitor_domains

  - name: find_question_gaps
    description: Find questions your audience asks that you haven't answered
    entry: src/tools/find-question-gaps.ts
    input_schema:
      type: object
      properties:
        your_domain:
          type: string
        topic_area:
          type: string
        sources:
          type: array
          items:
            type: string
            enum: [google, reddit, quora, stackoverflow, twitter]
          default: [google, reddit]
      required:
        - your_domain
        - topic_area

dependencies:
  runtime:
    - "axios@^1.6.0"
    - "zod@^3.22.0"
    - "cheerio@^1.0.0-rc.12"
  development:
    - "@types/node@^20.0.0"

pricing:
  model: freemium
  tiers:
    - name: Free
      price: 0
      limits:
        requests_per_month: 50
        max_competitors: 3
      features:
        - Basic content gap analysis
        - Content brief generation
        - Up to 3 competitors

    - name: Pro
      price: 49
      limits:
        requests_per_month: 500
        max_competitors: 10
      features:
        - Everything in Free
        - Competitor monitoring
        - Question gap analysis
        - Priority support

    - name: Enterprise
      price: 299
      limits:
        requests_per_month: unlimited
        max_competitors: unlimited
      features:
        - Everything in Pro
        - Custom data sources
        - API access
        - Dedicated support

metadata:
  repository: https://github.com/agentfoundry/skills/content-gap-analyzer
  documentation: https://docs.agentfoundry.dev/skills/content-gap-analyzer
  license: MIT
  keywords:
    - content-marketing
    - seo
    - competitor-analysis

# Marketplace Tier
