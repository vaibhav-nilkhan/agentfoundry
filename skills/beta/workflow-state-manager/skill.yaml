schema_version: "1.0"
name: workflow-state-manager
version: 1.0.0
description: Track and persist workflow state for resumable multi-step processes

author:
  name: AgentFoundry Team
  email: team@agentfoundry.ai
  url: https://agentfoundry.ai

categories:
  - state-management
  - workflow
  - persistence
tags:
  - state
  - workflow
  - persistence
  - resumable

pricing:
  model: usage
  tiers:
    free:
      limit: 35
      period: month
      price: 0
    pro:
      limit: unlimited
      period: month
      price: 35
    enterprise:
      limit: unlimited
      period: month
      price: 169

platforms:
  - mcp
  - claude_skills
  - langchain

tools:
  - name: save_state
    description: Persist workflow state
    entry: src/tools/save-state.ts
    input_schema:
      type: object
      required:
        - workflow_id
        - state
      properties:
        workflow_id:
          type: string
        state:
          type: object
    output_schema:
      type: object
      properties:
        saved:
          type: boolean

  - name: load_state
    description: Resume workflow from saved state
    entry: src/tools/load-state.ts
    input_schema:
      type: object
      required:
        - workflow_id
      properties:
        workflow_id:
          type: string
    output_schema:
      type: object
      properties:
        state:
          type: object

  - name: track_progress
    description: Monitor workflow completion
    entry: src/tools/track-progress.ts
    input_schema:
      type: object
      required:
        - workflow_id
      properties:
        workflow_id:
          type: string
    output_schema:
      type: object
      properties:
        progress_percent:
          type: number
        completed_steps:
          type: integer

dependencies:
  runtime:
    - zod: ^3.22.0

permissions:
  - storage: For state persistence

documentation:
  readme: README.md

metrics:
  tracked:
    - states_saved
    - workflows_resumed
  reporting: true
  retention_days: 90
