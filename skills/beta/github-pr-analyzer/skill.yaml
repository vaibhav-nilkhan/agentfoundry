schema_version: "1.0"

name: github-pr-analyzer
version: 1.0.0
description: Intelligent GitHub pull request analysis with security scanning, code quality scoring, and AI-powered recommendations

author:
  name: AgentFoundry Team
  email: team@agentfoundry.dev
  github: agentfoundry

license: MIT

repository:
  type: git
  url: https://github.com/agentfoundry/skills/github-pr-analyzer

homepage: https://agentfoundry.dev/skills/github-pr-analyzer

platforms:
  - mcp
  - claude-skills
  - openai-agents

permissions:
  - network

categories:
  - developer-tools
  - code-analysis
  - security

tags:
  - github
  - pull-requests
  - code-review
  - security
  - quality-analysis
  - ci-cd

tools:
  - name: analyze_pr
    description: Comprehensive pull request analysis including code quality, security, and best practices
    entry: src/tools/analyze-pr.ts
    input_schema:
      type: object
      properties:
        repo_owner:
          type: string
          description: GitHub repository owner (user or organization)
        repo_name:
          type: string
          description: GitHub repository name
        pr_number:
          type: integer
          description: Pull request number
          minimum: 1
        include_diff:
          type: boolean
          description: Include full code diff in analysis
          default: false
      required:
        - repo_owner
        - repo_name
        - pr_number
    output_schema:
      type: object
      properties:
        score:
          type: number
          description: Overall quality score (0-100)
        status:
          type: string
          enum: [excellent, good, needs_improvement, poor]
        files_changed:
          type: integer
        lines_added:
          type: integer
        lines_deleted:
          type: integer
        security_issues:
          type: array
        code_smells:
          type: array
        recommendations:
          type: array
        metadata:
          type: object

  - name: suggest_reviewers
    description: AI-powered reviewer suggestions based on code expertise and past contributions
    entry: src/tools/suggest-reviewers.ts
    input_schema:
      type: object
      properties:
        repo_owner:
          type: string
        repo_name:
          type: string
        pr_number:
          type: integer
          minimum: 1
        max_reviewers:
          type: integer
          description: Maximum number of reviewers to suggest
          default: 3
          minimum: 1
          maximum: 10
      required:
        - repo_owner
        - repo_name
        - pr_number
    output_schema:
      type: object
      properties:
        suggested_reviewers:
          type: array
        reasoning:
          type: object

  - name: check_merge_safety
    description: Determine if PR is safe to merge based on checks, conflicts, and best practices
    entry: src/tools/check-merge-safety.ts
    input_schema:
      type: object
      properties:
        repo_owner:
          type: string
        repo_name:
          type: string
        pr_number:
          type: integer
          minimum: 1
      required:
        - repo_owner
        - repo_name
        - pr_number
    output_schema:
      type: object
      properties:
        safe_to_merge:
          type: boolean
        blocking_issues:
          type: array
        warnings:
          type: array
        merge_strategy:
          type: string
          enum: [squash, merge, rebase]

dependencies:
  npm:
    - "@octokit/rest@^20.0.0"
    - "zod@^3.22.4"
    - "axios@^1.6.0"
  env:
    - name: GITHUB_TOKEN
      required: true
      description: GitHub personal access token with repo access (https://github.com/settings/tokens)

config:
  timeout_ms: 30000
  max_files_analyzed: 100
  supported_languages:
    - typescript
    - javascript
    - python
    - java
    - go
    - rust
    - ruby
  security_patterns:
    - hardcoded_secrets
    - sql_injection
    - xss_vulnerabilities
    - path_traversal
    - command_injection

pricing:
  type: freemium
  tiers:
    - name: free
      price: 0
      limits:
        requests_per_month: 100
    - name: pro
      price: 29
      limits:
        requests_per_month: 1000
    - name: enterprise
      price: 299
      limits:
        requests_per_month: unlimited

validation:
  static_checks:
    - manifest_schema
    - required_files
    - typescript_compile
    - linting
    - security_audit
  sandbox_tests:
    - basic_execution
    - error_handling
    - timeout_handling
    - rate_limiting
    - auth_validation

# Marketplace Tier
tier: beta
tier_metadata:
  status: partial
  confidence: medium
  validation_date: "2025-11-17"
  badge: "🧪 Beta - Community Validation Needed"
  marketplace_featured: false
  market_note: "Saturated market with established commercial and open-source players"
  competitors:
    - Greptile (commercial)
    - CodeRabbit (commercial)
    - PR-Agent by Qodo AI (open source)
    - Multiple GitHub Actions
  recommendation: "Only install if you need AgentFoundry-specific features - otherwise use established tools"
