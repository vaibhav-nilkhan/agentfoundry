schema_version: "1.0"
name: decision-explainer
version: 1.0.0
description: Provide step-by-step decision breakdowns, confidence scoring, and audit-friendly explanation chains for transparency and compliance

author:
  name: AgentFoundry Team
  email: team@agentfoundry.ai
  url: https://agentfoundry.ai

categories:
  - transparency
  - compliance
  - debugging
tags:
  - explainability
  - audit-trail
  - decision-transparency
  - compliance

pricing:
  model: usage
  tiers:
    free:
      limit: 30
      period: month
      price: 0
    pro:
      limit: unlimited
      period: month
      price: 39
    enterprise:
      limit: unlimited
      period: month
      price: 249

platforms:
  - mcp
  - claude_skills
  - openai_actions

tools:
  - name: explain_decision
    description: Break down agent reasoning step-by-step
    entry: src/tools/explain-decision.ts
    input_schema:
      type: object
      required:
        - decision
        - context
      properties:
        decision:
          type: string
        context:
          type: object
        detail_level:
          type: string
          enum: [summary, detailed, comprehensive]
          default: detailed
    output_schema:
      type: object
      properties:
        explanation:
          type: string
        reasoning_steps:
          type: array
        alternatives_considered:
          type: array

  - name: score_confidence
    description: Rate decision certainty and identify uncertainty factors
    entry: src/tools/score-confidence.ts
    input_schema:
      type: object
      required:
        - decision
      properties:
        decision:
          type: object
    output_schema:
      type: object
      properties:
        confidence_score:
          type: number
        uncertainty_factors:
          type: array
        recommendation:
          type: string

  - name: generate_audit_trail
    description: Create compliance-ready decision logs
    entry: src/tools/generate-audit-trail.ts
    input_schema:
      type: object
      required:
        - execution_history
      properties:
        execution_history:
          type: array
        compliance_standard:
          type: string
          enum: [soc2, hipaa, gdpr, general]
          default: general
    output_schema:
      type: object
      properties:
        audit_log:
          type: array
        compliance_status:
          type: string
        recommendations:
          type: array

  - name: visualize_reasoning
    description: Generate decision tree diagrams
    entry: src/tools/visualize-reasoning.ts
    input_schema:
      type: object
      required:
        - decision_path
      properties:
        decision_path:
          type: array
        format:
          type: string
          enum: [text, mermaid, json]
          default: text
    output_schema:
      type: object
      properties:
        visualization:
          type: string
        format:
          type: string

dependencies:
  runtime:
    - zod: ^3.22.0

documentation:
  readme: README.md

metrics:
  tracked:
    - explanations_generated
    - confidence_scores
    - audit_trails_created
  reporting: true
  retention_days: 90
