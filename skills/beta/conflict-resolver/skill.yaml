schema_version: "1.0"
name: conflict-resolver
version: 1.0.0
description: Resolve resource conflicts between concurrent agents automatically

author:
  name: AgentFoundry Team
  email: team@agentfoundry.ai
  url: https://agentfoundry.ai

categories:
  - multi-agent
  - conflict-resolution
tags:
  - conflicts
  - resolution
  - resources
  - concurrency

pricing:
  model: usage
  tiers:
    free:
      limit: 25
      period: month
      price: 0
    pro:
      limit: unlimited
      period: month
      price: 29
    enterprise:
      limit: unlimited
      period: month
      price: 149

platforms:
  - mcp
  - claude_skills
  - langchain

tools:
  - name: detect_conflict
    description: Identify resource conflicts
    entry: src/tools/detect-conflict.ts
    input_schema:
      type: object
      required:
        - agent_requests
      properties:
        agent_requests:
          type: array
    output_schema:
      type: object
      properties:
        has_conflict:
          type: boolean
        conflicting_agents:
          type: array

  - name: resolve_conflict
    description: Apply conflict resolution strategy
    entry: src/tools/resolve-conflict.ts
    input_schema:
      type: object
      required:
        - conflict
      properties:
        conflict:
          type: object
        strategy:
          type: string
          enum: [priority, fair, random]
          default: priority
    output_schema:
      type: object
      properties:
        resolution:
          type: object
        winner:
          type: string

dependencies:
  runtime:
    - zod: ^3.22.0

documentation:
  readme: README.md

metrics:
  tracked:
    - conflicts_detected
    - conflicts_resolved
  reporting: true
  retention_days: 90

# Marketplace Tier
tier: beta
tier_metadata:
  status: partial
  confidence: medium
  validation_date: "2025-11-17"
  badge: "🧪 Beta - Community Validation Needed"
  marketplace_featured: false
  market_note: "Major IDEs already ship AI-powered merge conflict resolution"
  competitors:
    - Visual Studio Code 1.105 (AI-assisted built-in)
    - GitKraken (AI Conflict Resolution)
    - JetBrains AI Assistant
    - Resolve.AI for VS Code
  recommendation: "Hard to compete with native IDE features - only install if IDEs don't meet your needs"
