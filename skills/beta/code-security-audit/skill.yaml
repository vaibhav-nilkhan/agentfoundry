schema_version: "1.0"
name: code-security-audit
version: 1.0.0
description: AI-powered security scanning with automated fixes and exploit generation

author:
  name: AgentFoundry
  email: skills@agentfoundry.dev
  url: https://agentfoundry.dev

platforms:
  - web
  - desktop
  - api

permissions:
  - file_read
  - network_access
  - git_read

categories:
  - developer-tools
  - security
  - devops

tags:
  - security
  - vulnerability-scanning
  - code-analysis
  - devsecops
  - compliance

tools:
  - name: scan_codebase
    description: Scan codebase for security vulnerabilities with CVSS scoring
    entry: src/tools/scan-codebase.ts
    input_schema:
      type: object
      properties:
        repo_url:
          type: string
        branch:
          type: string
          default: main
        scan_depth:
          type: string
          enum: [quick, standard, deep]
          default: standard
        include_dependencies:
          type: boolean
          default: true
        compliance_framework:
          type: string
          enum: [none, soc2, iso27001, pci-dss, hipaa]
          default: none
      required:
        - repo_url

  - name: generate_fix
    description: Generate automated security fix with code patch
    entry: src/tools/generate-fix.ts
    input_schema:
      type: object
      properties:
        vulnerability_id:
          type: string
          description: ID from scan_codebase output
        fix_strategy:
          type: string
          enum: [minimal, comprehensive, refactor]
          default: comprehensive
        auto_apply:
          type: boolean
          description: Automatically create PR with fix
          default: false
      required:
        - vulnerability_id

  - name: verify_fix
    description: Verify that a security fix actually resolves the vulnerability
    entry: src/tools/verify-fix.ts
    input_schema:
      type: object
      properties:
        vulnerability_id:
          type: string
        fixed_code:
          type: string
          description: The proposed fix
        run_exploit:
          type: boolean
          description: Try to exploit after fix
          default: true
      required:
        - vulnerability_id
        - fixed_code

  - name: monitor_dependencies
    description: Continuous monitoring of dependency vulnerabilities
    entry: src/tools/monitor-dependencies.ts
    input_schema:
      type: object
      properties:
        repo_url:
          type: string
        package_managers:
          type: array
          items:
            type: string
            enum: [npm, pip, maven, gradle, cargo]
        alert_severity:
          type: string
          enum: [all, high, critical]
          default: high
      required:
        - repo_url

dependencies:
  runtime:
    - "axios@^1.6.0"
    - "zod@^3.22.0"
  development:
    - "@types/node@^20.0.0"

pricing:
  model: freemium
  tiers:
    - name: Free
      price: 0
      limits:
        scans_per_month: 10
        max_repo_size_mb: 100
      features:
        - Basic vulnerability scanning
        - Dependency monitoring
        - Manual fixes only

    - name: Pro
      price: 99
      limits:
        scans_per_month: 100
        max_repo_size_mb: 1000
      features:
        - Everything in Free
        - Automated fix generation
        - Fix verification
        - Compliance reporting
        - Priority support

    - name: Enterprise
      price: 499
      limits:
        scans_per_month: unlimited
        max_repo_size_mb: unlimited
      features:
        - Everything in Pro
        - Auto-apply fixes (PR creation)
        - Custom compliance frameworks
        - SLA guarantees
        - Dedicated support

metadata:
  repository: https://github.com/agentfoundry/skills/code-security-audit
  documentation: https://docs.agentfoundry.dev/skills/code-security-audit
  license: MIT
  keywords:
    - security
    - vulnerability-scanning
    - devsecops
