schema_version: "1.0"
name: data-freshness-validator
version: 1.0.0
description: Check if data is stale before using it to prevent outdated information issues

author:
  name: AgentFoundry Team
  email: team@agentfoundry.ai
  url: https://agentfoundry.ai

categories:
  - data-quality
  - validation
tags:
  - data-freshness
  - staleness
  - validation

pricing:
  model: usage
  tiers:
    free:
      limit: 50
      period: month
      price: 0
    pro:
      limit: unlimited
      period: month
      price: 29
    enterprise:
      limit: unlimited
      period: month
      price: 149

platforms:
  - mcp
  - claude_skills
  - openai_actions

tools:
  - name: check_freshness
    description: Validate data recency
    entry: src/tools/check-freshness.ts
    input_schema:
      type: object
      required:
        - data
      properties:
        data:
          type: object
        max_age_hours:
          type: number
          default: 24
    output_schema:
      type: object
      properties:
        is_fresh:
          type: boolean
        age_hours:
          type: number

  - name: invalidate_cache
    description: Mark data as stale
    entry: src/tools/invalidate-cache.ts
    input_schema:
      type: object
      required:
        - cache_key
      properties:
        cache_key:
          type: string
    output_schema:
      type: object
      properties:
        invalidated:
          type: boolean

dependencies:
  runtime:
    - zod: ^3.22.0

documentation:
  readme: README.md

metrics:
  tracked:
    - freshness_checks
    - stale_data_detected
  reporting: true
  retention_days: 90

# Marketplace Tier
tier: beta
tier_metadata:
  status: partial
  confidence: medium
  validation_date: "2025-11-17"
  badge: "🧪 Beta - Community Validation Needed"
  marketplace_featured: false
  market_note: "Data observability platforms provide comprehensive solutions"
  competitors:
    - Great Expectations (GX)
    - Elementary (ML-based freshness monitoring)
    - Monte Carlo Data
    - Databricks (Oct 7, 2025 freshness evaluation)
  recommendation: "Consider if Great Expectations doesn't meet your data quality needs"
