schema_version: "1.0"

name: my-api-integration
version: 1.0.0
description: Integration with [API Name] for [purpose]

author:
  name: Your Name
  email: you@example.com

license: MIT

platforms:
  - mcp
  - claude-skills

permissions:
  - network  # Required for API calls

categories:
  - developer-tools

tags:
  - api
  - integration

tools:
  - name: fetch_data
    description: Fetch data from the API
    entry: src/tools/fetch-data.ts
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Search query or identifier
      required:
        - query

dependencies:
  npm:
    - "axios@^1.6.0"
    - "zod@^3.22.4"
  env:
    - name: API_KEY
      required: true
      description: API key for authentication
    - name: API_BASE_URL
      required: false
      description: Base URL (defaults to production)

config:
  timeout_ms: 30000
  max_retries: 3
  rate_limit_per_minute: 60

validation:
  static_checks:
    - manifest_schema
    - required_files
    - typescript_compile
  sandbox_tests:
    - basic_execution
    - error_handling
    - rate_limiting
