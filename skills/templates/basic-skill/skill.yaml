schema_version: "1.0"

# Basic Metadata - CHANGE THESE
name: my-basic-skill
version: 1.0.0
description: A simple single-tool skill

author:
  name: Your Name
  email: you@example.com

license: MIT

platforms:
  - mcp
  - claude-skills

permissions: []

categories:
  - developer-tools

tags:
  - example
  - template

tools:
  - name: my_tool
    description: Describe what this tool does
    entry: src/tools/my-tool.ts
    input_schema:
      type: object
      properties:
        input_param:
          type: string
          description: Description of the parameter
      required:
        - input_param
    output_schema:
      type: object
      properties:
        result:
          type: string
          description: The tool output

validation:
  static_checks:
    - manifest_schema
    - required_files
    - typescript_compile
  sandbox_tests:
    - basic_execution
    - error_handling
